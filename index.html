<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Meu Visualizador 3D VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #ECECEC">
      
      <a-assets>
        <a-asset-item id="modelo" src="modelo3d.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        gltf-model="#modelo" 
        position="0 1 -3" 
        scale="1 1 1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="-1 1 0"></a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
      
    </a-scene>
  </body>
</html>
